name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: unbox-your-potential/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: unbox-your-potential

      - name: Build
        run: pnpm build
        working-directory: unbox-your-potential

      - uses: actions/upload-pages-artifact@v3
        with:
          path: unbox-your-potential/dist

      - uses: actions/deploy-pages@v4
        id: deployment
